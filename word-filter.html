<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Web筛词器</title>
    <style>
        :root {
            --primary: #4A90D9;
            --danger: #E74C3C;
            --success: #27AE60;
            --bg: #f5f6fa;
            --card: #ffffff;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --border: #e0e0e0;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --radius: 16px;
            --nav-height: 64px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: calc(var(--nav-height) + 24px);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* 页面容器 */
        .page {
            display: none;
            padding: 20px 16px;
            animation: fadeIn 0.25s ease;
        }
        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 顶部标题栏 */
        .header {
            text-align: center;
            padding: 8px 0 16px;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
        }
        .header .subtitle {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 4px;
        }

        /* ====== 筛选页面 ====== */
        .filter-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 40px 24px;
            text-align: center;
            min-height: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: transform 0.2s ease;
            cursor: pointer;
        }
        .filter-card:active {
            transform: scale(0.98);
        }

        .word-display {
            font-size: 48px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 2px;
            margin-bottom: 4px;
            transition: all 0.3s ease;
        }

        .word-detail {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, opacity 0.3s ease, margin 0.3s ease;
            opacity: 0;
            margin-top: 0;
        }
        .word-detail.show {
            max-height: 200px;
            opacity: 1;
            margin-top: 12px;
        }

        .word-phonetic {
            font-size: 16px;
            color: var(--text-light);
            margin-bottom: 8px;
            font-style: italic;
        }
        .word-meaning {
            font-size: 17px;
            color: var(--text);
            line-height: 1.6;
            padding: 0 12px;
        }

        .word-hint {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 8px;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            margin-top: 28px;
            width: 100%;
            max-width: 340px;
        }

        .btn {
            flex: 1;
            padding: 16px 20px;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn:active {
            transform: scale(0.95);
        }

        .btn-danger {
            background: var(--danger);
            color: #fff;
            box-shadow: 0 4px 14px rgba(231, 76, 60, 0.35);
        }
        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-success {
            background: var(--success);
            color: #fff;
            box-shadow: 0 4px 14px rgba(39, 174, 96, 0.35);
        }
        .btn-success:hover {
            background: #219a52;
        }

        .btn-icon {
            font-size: 22px;
        }

        .progress-info {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-light);
        }
        .progress-info span {
            background: var(--bg);
            padding: 6px 14px;
            border-radius: 20px;
        }

        /* ====== 词库选取页面 ====== */
        .wordbank-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .wordbank-item {
            background: var(--card);
            border-radius: 12px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .wordbank-item:active {
            transform: scale(0.98);
        }
        .wordbank-item.active {
            border-color: var(--primary);
            background: #f0f6ff;
        }
        .wordbank-item .name {
            font-size: 16px;
            font-weight: 600;
        }
        .wordbank-item .count {
            font-size: 13px;
            color: var(--text-light);
        }
        .wordbank-item .check {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .wordbank-item.active .check {
            opacity: 1;
        }

        .wordbank-search {
            margin-bottom: 16px;
        }
        .wordbank-search input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .wordbank-search input:focus {
            border-color: var(--primary);
        }

        /* ====== 生词本页面 ====== */
        .vocab-stats {
            text-align: center;
            margin-bottom: 16px;
            font-size: 14px;
            color: var(--text-light);
        }
        .vocab-stats strong {
            color: var(--danger);
            font-size: 22px;
            vertical-align: -2px;
            margin: 0 4px;
        }
        .vocab-empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }
        .vocab-empty .icon {
            font-size: 56px;
            margin-bottom: 16px;
        }
        .vocab-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .vocab-item {
            background: var(--card);
            border-radius: 12px;
            padding: 16px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .vocab-item:active {
            transform: scale(0.98);
        }
        .vocab-item .v-word {
            font-size: 18px;
            font-weight: 600;
        }
        .vocab-item .v-meaning {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 4px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, margin 0.3s ease;
        }
        .vocab-item .v-meaning.show {
            max-height: 60px;
            margin-top: 6px;
        }
        .vocab-item .v-delete {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #fee;
            color: var(--danger);
            border: none;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .vocab-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .btn-outline {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--card);
            color: var(--text);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        .btn-outline:active {
            background: var(--bg);
        }
        .btn-outline.danger {
            border-color: #fcc;
            color: var(--danger);
        }

        /* ====== PDF导出页面 ====== */
        .export-preview {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
            min-height: 300px;
            margin-bottom: 20px;
        }
        .export-preview h3 {
            text-align: center;
            margin-bottom: 16px;
            font-size: 18px;
        }
        .export-word-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .export-word-item {
            background: var(--bg);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 14px;
        }
        .export-word-item .ew-word {
            font-weight: 600;
        }
        .export-word-item .ew-meaning {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 2px;
        }
        .export-empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }
        .btn-export {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(74, 144, 217, 0.35);
            transition: all 0.2s;
            letter-spacing: 1px;
        }
        .btn-export:active {
            transform: scale(0.97);
        }
        .btn-export:disabled {
            background: #bdc3c7;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* ====== 底部导航栏 ====== */
        .navbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--nav-height);
            background: var(--card);
            display: flex;
            align-items: center;
            justify-content: space-around;
            box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            cursor: pointer;
            color: var(--text-light);
            transition: color 0.2s;
            font-size: 11px;
            font-weight: 500;
            border: none;
            background: none;
        }
        .nav-item .nav-icon {
            font-size: 22px;
            line-height: 1;
        }
        .nav-item.active {
            color: var(--primary);
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(44, 62, 80, 0.92);
            color: #fff;
            padding: 10px 24px;
            border-radius: 24px;
            font-size: 14px;
            z-index: 200;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .toast.show {
            opacity: 1;
        }

        /* 响应式 */
        @media (min-width: 600px) {
            .page {
                max-width: 500px;
                margin: 0 auto;
            }
            .navbar {
                max-width: 500px;
                left: 50%;
                transform: translateX(-50%);
                border-radius: 20px 20px 0 0;
            }
        }
    </style>
</head>
<body>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- ====== 筛选页面 ====== -->
    <div class="page active" id="page-filter">
        <div class="header">
            <h1>单词筛选</h1>
            <div class="subtitle" id="current-bank-label">当前词库：高中3500词</div>
        </div>
        <div class="filter-card" id="filter-card" onclick="toggleWordDetail()">
            <div class="word-display" id="word-display">abandon</div>
            <div class="word-detail" id="word-detail">
                <div class="word-phonetic" id="word-phonetic"></div>
                <div class="word-meaning" id="word-meaning"></div>
            </div>
            <div class="word-hint" id="word-hint">点击单词查看音标和释义</div>
        </div>
        <div class="btn-group">
            <button class="btn btn-danger" onclick="handleWord(false)">
                <span class="btn-icon">✕</span> 不认识
            </button>
            <button class="btn btn-success" onclick="handleWord(true)">
                <span class="btn-icon">✓</span> 认识
            </button>
        </div>
        <div class="progress-info">
            <span id="stat-reviewed">已筛选: 0</span>
            <span id="stat-vocab">生词本: 0</span>
        </div>
    </div>

    <!-- ====== 词库选取页面 ====== -->
    <div class="page" id="page-banks">
        <div class="header">
            <h1>词库选取</h1>
            <div class="subtitle">选择一个词库，筛选单词将从中随机抽取</div>
        </div>
        <div class="wordbank-list" id="wordbank-list"></div>
    </div>

    <!-- ====== 生词本页面 ====== -->
    <div class="page" id="page-vocab">
        <div class="header">
            <h1>生词本</h1>
            <div class="subtitle">你标记为"不认识"的单词</div>
        </div>
        <div class="vocab-stats" id="vocab-stats"></div>
        <div class="vocab-list" id="vocab-list"></div>
        <div class="vocab-empty" id="vocab-empty">
            <div class="icon">📖</div>
            <p>生词本还是空的</p>
            <p style="font-size:13px;margin-top:4px;">在筛选页面点击"不认识"来添加单词</p>
        </div>
        <div class="vocab-actions" id="vocab-actions" style="display:none;">
            <button class="btn-outline danger" onclick="clearVocab()">清空生词本</button>
        </div>
    </div>

    <!-- ====== PDF导出页面 ====== -->
    <div class="page" id="page-export">
        <div class="header">
            <h1>PDF 导出</h1>
            <div class="subtitle">将生词本导出为PDF文件下载</div>
        </div>
        <div class="export-preview" id="export-preview">
            <h3>📋 生词本预览</h3>
            <div class="export-word-list" id="export-word-list"></div>
            <div class="export-empty" id="export-empty-preview">
                <p>生词本为空，请先在筛选页面添加生词</p>
            </div>
        </div>
        <button class="btn-export" id="btn-export" onclick="exportPDF()" disabled>
            📥 导出PDF并下载
        </button>
    </div>

    <!-- ====== 底部导航栏 ====== -->
    <nav class="navbar">
        <button class="nav-item active" data-page="filter" onclick="switchPage('filter')">
            <span class="nav-icon">🔍</span> 筛选
        </button>
        <button class="nav-item" data-page="banks" onclick="switchPage('banks')">
            <span class="nav-icon">📚</span> 词库选取
        </button>
        <button class="nav-item" data-page="vocab" onclick="switchPage('vocab')">
            <span class="nav-icon">📝</span> 生词本
        </button>
        <button class="nav-item" data-page="export" onclick="switchPage('export')">
            <span class="nav-icon">📄</span> PDF导出
        </button>
    </nav>

    <!-- PDF生成库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        // ============ 数据层 ============

        // 高中3500词数据（从GitHub提取的完整数据）
        const HIGH_SCHOOL_3500 = [];

        // 解析函数：从raw文本解析单词数据
        function parseWordData(rawText) {
            // 原始数据格式（每3行为一组）：
            //   abandon        ← 单词（可能带尾部空格）
            //   [əˈbændən]     ← 音标
            //    v.抛弃，舍弃   ← 释义（可能跨多行直到空行）
            const words = [];
            const lines = rawText.split('\n');
            let i = 0;

            while (i < lines.length) {
                // 跳过空行
                while (i < lines.length && lines[i].trim() === '') i++;
                if (i >= lines.length) break;

                // 第1行：单词（只取纯字母，排除 a (an) / according to 等非纯单词）
                const wordLine = lines[i].trim();
                const wordMatch = wordLine.match(/^([a-zA-Z]+)/);
                if (!wordMatch) { i++; continue; }
                const rawWord = wordMatch[1];

                // 跳过不符合要求的条目
                if (rawWord.length < 2 || rawWord.length > 30) { i++; continue; }
                if (/^[A-Z]{2,}$/.test(rawWord)) { i++; continue; } // 全大写缩写

                i++;

                // 第2行：音标
                let phonetic = '';
                if (i < lines.length && lines[i].trim().startsWith('[')) {
                    phonetic = lines[i].trim();
                    i++;
                }

                // 第3行及后续：释义（直到遇到空行或下一个单词）
                let meaning = '';
                while (i < lines.length && lines[i].trim() !== '') {
                    const ln = lines[i].trim();
                    // 如果这行看起来像新单词（纯字母开头 + 不是释义续行），停止
                    if (/^[a-zA-Z]+\s*$/.test(ln) && !ln.startsWith('v.') && !ln.startsWith('n.') && !ln.startsWith('a.') && !ln.startsWith('ad.') && !ln.startsWith('prep.') && !ln.startsWith('conj.') && !ln.startsWith('art.') && !ln.startsWith('pron.') && !ln.startsWith('num.') && !ln.startsWith('int.') && !ln.startsWith('aux.') && !ln.startsWith('vi.') && !ln.startsWith('vt.')) {
                        // 检查下一行是否是音标
                        if (i + 1 < lines.length && lines[i + 1].trim().startsWith('[')) {
                            break;
                        }
                    }
                    meaning += (meaning ? ' ' : '') + ln;
                    i++;
                }
                meaning = meaning.trim();

                words.push({
                    word: rawWord,
                    phonetic: phonetic,
                    meaning: meaning
                });
            }

            console.log(`解析完成: ${words.length} 个纯单词条目`);
            return words;
        }

        // 内嵌核心数据：常用高频词 + 从3500.txt提取的核心词
        // 由于完整3500词数据量太大，我们使用fetch从本地加载
        async function load3500Words() {
            try {
                // 首先尝试从GitHub加载
                const resp = await fetch('https://raw.githubusercontent.com/pluto0x0/word3500/master/3500.txt');
                if (resp.ok) {
                    const text = await resp.text();
                    const words = parseWordData(text);
                    if (words.length > 1000) {
                        HIGH_SCHOOL_3500.length = 0;
                        HIGH_SCHOOL_3500.push(...words);
                        console.log(`从GitHub加载了 ${words.length} 个单词`);
                        return words;
                    }
                }
            } catch (e) {
                console.log('GitHub加载失败，使用内置数据:', e.message);
            }
            // 回退到内置数据
            return loadBuiltinWords();
        }

        function loadBuiltinWords() {
            const builtin = getBuiltin3500Words();
            HIGH_SCHOOL_3500.length = 0;
            HIGH_SCHOOL_3500.push(...builtin);
            console.log(`使用内置数据: ${builtin.length} 个单词`);
            return builtin;
        }

        // ============ 状态管理 ============
        const state = {
            currentPage: 'filter',
            selectedBank: 'highschool3500', // 当前选中的词库ID
            currentWord: null,
            wordDetailShown: false,
            reviewedCount: 0,
            vocabList: [], // 生词本: [{word, phonetic, meaning, addedAt}]
            wordBanks: [],
            shuffledQueue: [], // 当前词库的随机队列
            queueIndex: 0,
        };

        // 从localStorage恢复
        function loadState() {
            try {
                const saved = localStorage.getItem('wordfilter_state');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    state.selectedBank = parsed.selectedBank || 'highschool3500';
                    state.vocabList = parsed.vocabList || [];
                    state.reviewedCount = parsed.reviewedCount || 0;
                }
            } catch (e) {}
        }

        function saveState() {
            try {
                localStorage.setItem('wordfilter_state', JSON.stringify({
                    selectedBank: state.selectedBank,
                    vocabList: state.vocabList,
                    reviewedCount: state.reviewedCount,
                }));
            } catch (e) {}
        }

        // ============ 词库定义 ============
        function initWordBanks() {
            state.wordBanks = [
                {
                    id: 'highschool3500',
                    name: '高中3500词',
                    description: '高考英语核心词汇',
                    getWords: () => HIGH_SCHOOL_3500,
                },
                {
                    id: 'ielts_core',
                    name: '雅思核心词汇',
                    description: '雅思考试高频核心词',
                    getWords: () => IELTS_CORE_WORDS,
                },
                {
                    id: 'cet4',
                    name: '大学英语四级',
                    description: 'CET-4 高频词汇精选',
                    getWords: () => CET4_WORDS,
                },
                {
                    id: 'daily',
                    name: '日常口语',
                    description: '日常英语口语高频词',
                    getWords: () => DAILY_ENGLISH,
                },
            ];
        }

        // ============ 辅助词库数据 ============
        const IELTS_CORE_WORDS = [
            {word:'abandon',phonetic:'[əˈbændən]',meaning:'v. 放弃，抛弃'},
            {word:'abstract',phonetic:'[ˈæbstrækt]',meaning:'a. 抽象的 n. 摘要'},
            {word:'abuse',phonetic:'[əˈbjuːz]',meaning:'v./n. 滥用；虐待'},
            {word:'academy',phonetic:'[əˈkædəmi]',meaning:'n. 学院，学会'},
            {word:'accelerate',phonetic:'[əkˈseləreɪt]',meaning:'v. 加速'},

        // ============ Toast ============
        let toastTimer;
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
        }

        // ============ 页面切换 ============
        function switchPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

            const pageMap = { filter: 'page-filter', banks: 'page-banks', vocab: 'page-vocab', export: 'page-export' };
            document.getElementById(pageMap[pageName]).classList.add('active');
            document.querySelector(`.nav-item[data-page="${pageName}"]`).classList.add('active');
            state.currentPage = pageName;

            if (pageName === 'banks') renderWordBanks();
            if (pageName === 'vocab') renderVocabList();
            if (pageName === 'export') renderExportPreview();
        }

        // ============ 词库渲染 ============
        function renderWordBanks() {
            const container = document.getElementById('wordbank-list');
            const banks = state.wordBanks;
            container.innerHTML = banks.map(bank => {
                const wordCount = bank.getWords().length;
                const isActive = state.selectedBank === bank.id;
                return `
                    <div class="wordbank-item ${isActive ? 'active' : ''}" onclick="selectBank('${bank.id}')">
                        <div>
                            <div class="name">${bank.name}</div>
                            <div class="count">${bank.description} · ${wordCount} 词</div>
                        </div>
                        <div class="check">✓</div>
                    </div>
                `;
            }).join('');
        }

        function selectBank(bankId) {
            if (state.selectedBank === bankId) return;
            state.selectedBank = bankId;
            state.reviewedCount = 0;
            resetQueue();
            saveState();
            renderWordBanks();
            updateCurrentBankLabel();
            showToast('词库已切换');
            // 如果当前在筛选页，刷新单词
            if (state.currentPage === 'filter') {
                nextWord();
            }
        }

        function updateCurrentBankLabel() {
            const bank = state.wordBanks.find(b => b.id === state.selectedBank);
            if (bank) {
                document.getElementById('current-bank-label').textContent = `当前词库：${bank.name}`;
            }
        }

        // ============ 单词队列 ============
        function resetQueue() {
            const bank = state.wordBanks.find(b => b.id === state.selectedBank);
            if (!bank) return;
            const words = bank.getWords();
            // Fisher-Yates shuffle
            state.shuffledQueue = [...words];
            for (let i = state.shuffledQueue.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [state.shuffledQueue[i], state.shuffledQueue[j]] = [state.shuffledQueue[j], state.shuffledQueue[i]];
            }
            state.queueIndex = 0;
        }

        function getNextWord() {
            const bank = state.wordBanks.find(b => b.id === state.selectedBank);
            if (!bank) return null;
            const words = bank.getWords();
            if (words.length === 0) return null;

            if (state.shuffledQueue.length === 0 || state.queueIndex >= state.shuffledQueue.length) {
                resetQueue();
            }

            const word = state.shuffledQueue[state.queueIndex];
            state.queueIndex++;
            return word;
        }

        // ============ 筛选页面逻辑 ============
        function toggleWordDetail() {
            if (!state.currentWord) return;
            state.wordDetailShown = !state.wordDetailShown;
            const detail = document.getElementById('word-detail');
            const hint = document.getElementById('word-hint');

            if (state.wordDetailShown) {
                detail.classList.add('show');
                hint.style.display = 'none';
            } else {
                detail.classList.remove('show');
                hint.style.display = 'block';
            }
        }

        function displayWord(word) {
            state.currentWord = word;
            state.wordDetailShown = false;
            document.getElementById('word-display').textContent = word.word;
            document.getElementById('word-phonetic').textContent = word.phonetic || '';
            document.getElementById('word-meaning').textContent = word.meaning || '';
            document.getElementById('word-detail').classList.remove('show');
            document.getElementById('word-hint').style.display = 'block';
            updateStats();
        }

        function nextWord() {
            const word = getNextWord();
            if (word) {
                displayWord(word);
            }
        }

        function handleWord(known) {
            if (!state.currentWord) return;

            if (!known) {
                // 不认识 → 加入生词本
                const exists = state.vocabList.find(v => v.word === state.currentWord.word);
                if (!exists) {
                    state.vocabList.push({
                        word: state.currentWord.word,
                        phonetic: state.currentWord.phonetic,
                        meaning: state.currentWord.meaning,
                        addedAt: new Date().toISOString(),
                    });
                    showToast('已加入生词本 📝');
                } else {
                    showToast('该词已在生词本中');
                }
            }

            state.reviewedCount++;
            saveState();
            updateStats();
            nextWord();
        }

        function updateStats() {
            document.getElementById('stat-reviewed').textContent = `已筛选: ${state.reviewedCount}`;
            document.getElementById('stat-vocab').textContent = `生词本: ${state.vocabList.length}`;
        }

        // ============ 生词本页面 ============
        function renderVocabList() {
            const listContainer = document.getElementById('vocab-list');
            const emptyContainer = document.getElementById('vocab-empty');
            const statsContainer = document.getElementById('vocab-stats');
            const actionsContainer = document.getElementById('vocab-actions');

            if (state.vocabList.length === 0) {
                listContainer.innerHTML = '';
                emptyContainer.style.display = 'block';
                statsContainer.innerHTML = '';
                actionsContainer.style.display = 'none';
            } else {
                emptyContainer.style.display = 'none';
                statsContainer.innerHTML = `共 <strong>${state.vocabList.length}</strong> 个生词`;
                actionsContainer.style.display = 'flex';

                listContainer.innerHTML = state.vocabList.map((v, i) => `
                    <div class="vocab-item" onclick="toggleVocabMeaning(${i})">
                        <div style="flex:1;">
                            <div class="v-word">${v.word}</div>
                            <div class="v-meaning" id="vocab-meaning-${i}">
                                ${v.phonetic ? v.phonetic + ' ' : ''}${v.meaning}
                            </div>
                        </div>
                        <button class="v-delete" onclick="event.stopPropagation(); removeVocab(${i})">✕</button>
                    </div>
                `).join('');
            }
        }

        function toggleVocabMeaning(index) {
            const el = document.getElementById(`vocab-meaning-${index}`);
            if (el) {
                el.classList.toggle('show');
            }
        }

        function removeVocab(index) {
            state.vocabList.splice(index, 1);
            saveState();
            renderVocabList();
            updateStats();
            showToast('已从生词本移除');
        }

        function clearVocab() {
            if (confirm('确定要清空所有生词吗？此操作不可恢复。')) {
                state.vocabList = [];
                saveState();
                renderVocabList();
                updateStats();
                showToast('生词本已清空');
            }
        }

        // ============ PDF导出 ============
        function renderExportPreview() {
            const listContainer = document.getElementById('export-word-list');
            const emptyContainer = document.getElementById('export-empty-preview');
            const btnExport = document.getElementById('btn-export');

            if (state.vocabList.length === 0) {
                listContainer.innerHTML = '';
                emptyContainer.style.display = 'block';
                btnExport.disabled = true;
            } else {
                emptyContainer.style.display = 'none';
                btnExport.disabled = false;
                listContainer.innerHTML = state.vocabList.map(v => `
                    <div class="export-word-item">
                        <div class="ew-word">${v.word}</div>
                        <div class="ew-meaning">${v.meaning}</div>
                    </div>
                `).join('');
            }
        }

        async function exportPDF() {
            if (state.vocabList.length === 0) {
                showToast('生词本为空，无法导出');
                return;
            }

            const btn = document.getElementById('btn-export');
            btn.disabled = true;
            btn.textContent = '⏳ 正在生成PDF...';

            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({
                    orientation: 'portrait',
                    unit: 'mm',
                    format: 'a4',
                });

                // 加载中文字体支持（使用内置字体 + Unicode）
                const pageWidth = doc.internal.pageSize.getWidth();
                const pageHeight = doc.internal.pageSize.getHeight();
                const margin = 15;
                const usableWidth = pageWidth - 2 * margin;

                // 标题
                doc.setFontSize(20);
                doc.setTextColor(44, 62, 80);
                doc.text('我的生词本', pageWidth / 2, 25, { align: 'center' });

                // 副标题
                doc.setFontSize(11);
                doc.setTextColor(127, 140, 141);
                const bank = state.wordBanks.find(b => b.id === state.selectedBank);
                const bankName = bank ? bank.name : '未知词库';
                doc.text(`词库: ${bankName}  |  共 ${state.vocabList.length} 个生词  |  ${new Date().toLocaleDateString('zh-CN')}`, pageWidth / 2, 33, { align: 'center' });

                // 分隔线
                doc.setDrawColor(189, 195, 199);
                doc.line(margin, 38, pageWidth - margin, 38);

                // 表格头
                let y = 46;
                doc.setFontSize(13);
                doc.setTextColor(44, 62, 80);
                doc.setFont(undefined, 'bold');
                doc.text('单词', margin, y);
                doc.text('释义', margin + 55, y);

                // 分隔线
                y += 4;
                doc.setDrawColor(236, 240, 241);
                doc.line(margin, y, pageWidth - margin, y);
                y += 6;

                // 单词列表
                doc.setFont(undefined, 'normal');
                doc.setFontSize(11);

                for (let i = 0; i < state.vocabList.length; i++) {
                    const v = state.vocabList[i];

                    // 检查是否需要新页
                    if (y > pageHeight - 25) {
                        doc.addPage();
                        y = 20;
                    }

                    // 序号
                    doc.setTextColor(149, 165, 166);
                    doc.text(`${i + 1}.`, margin, y);

                    // 单词
                    doc.setTextColor(44, 62, 80);
                    doc.setFont(undefined, 'bold');
                    doc.text(v.word, margin + 8, y);
                    doc.setFont(undefined, 'normal');

                    // 释义
                    const meaningText = v.meaning || '';
                    // 截断过长的释义
                    const maxChars = 55;
                    const displayMeaning = meaningText.length > maxChars
                        ? meaningText.substring(0, maxChars) + '...'
                        : meaningText;
                    doc.setTextColor(52, 73, 94);
                    doc.text(displayMeaning, margin + 55, y);

                    y += 8;
                }

                // 保存PDF
                doc.save(`生词本_${new Date().toISOString().slice(0,10)}.pdf`);
                showToast('PDF已导出并下载 ✅');
            } catch (err) {
                console.error('PDF导出失败:', err);
                showToast('PDF导出失败，请重试');
            } finally {
                btn.disabled = false;
                btn.textContent = '📥 导出PDF并下载';
            }
        }

        // ============ 初始化 ============
        async function init() {
            loadState();
            initWordBanks();

            // 加载高中3500词
            const words = await load3500Words();
            console.log(`词库就绪: ${words.length} 词`);

            // 初始化当前词库
            updateCurrentBankLabel();
            resetQueue();

            // 显示第一个单词
            nextWord();
            updateStats();

            // 预渲染
            renderWordBanks();
            renderVocabList();
        }

        // 启动
        init();
    </script>
</body>
</html>
